            "ngc2261":  "Hubble Variable Nebula NGC2261",
            # GALASSIE
            "m31":      "Andromeda Galaxy M31",
            "m33":      "Triangulum Galaxy M33",
            "ngc891":   "NGC891 edge on galaxy",
