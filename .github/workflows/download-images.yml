name: Download Astro Images v3 (NASA)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download images via NASA API
        run: |
          mkdir -p img
          python3 << 'PYEOF'
          import urllib.request, json, os, time

          os.makedirs("img", exist_ok=True)

          def nasa_search(query, dest):
              """Search NASA Images API and download first result"""
              if os.path.exists(dest) and os.path.getsize(dest) > 5000:
                  print(f"  skip {dest}")
                  return True
              try:
                  q = urllib.request.quote(query)
                  url = f"https://images-api.nasa.gov/search?q={q}&media_type=image&page_size=1"
                  req = urllib.request.Request(url, headers={"User-Agent": "AstrofotoTool/1.0"})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      data = json.loads(r.read())
                  items = data.get("collection", {}).get("items", [])
                  if not items:
                      print(f"  ✗ {dest} - no results for: {query}")
                      return False
                  # Get asset manifest
                  nasa_id = items[0]["data"][0]["nasa_id"]
                  asset_url = f"https://images-api.nasa.gov/asset/{urllib.request.quote(nasa_id)}"
                  req2 = urllib.request.Request(asset_url, headers={"User-Agent": "AstrofotoTool/1.0"})
                  with urllib.request.urlopen(req2, timeout=15) as r2:
                      assets = json.loads(r2.read())
                  # Find largest jpg
                  hrefs = [i["href"] for i in assets.get("collection", {}).get("items", [])
                           if i["href"].lower().endswith((".jpg", ".jpeg"))]
                  if not hrefs:
                      print(f"  ✗ {dest} - no jpg in assets")
                      return False
                  # Prefer ~medium size
                  img_url = sorted(hrefs)[0]
                  for h in hrefs:
                      if "medium" in h or "1024" in h or "800" in h:
                          img_url = h; break
                  req3 = urllib.request.Request(img_url, headers={"User-Agent": "AstrofotoTool/1.0"})
                  with urllib.request.urlopen(req3, timeout=20) as r3:
                      data = r3.read()
                  if len(data) > 5000:
                      with open(dest, "wb") as f:
                          f.write(data)
                      print(f"  ✓ {dest} ({len(data)//1024}KB) — {query}")
                      return True
                  else:
                      print(f"  ✗ {dest} - file too small")
                      return False
              except Exception as e:
                  print(f"  ✗ {dest} - {e}")
                  return False

          # Object ID -> NASA search query
          OBJECTS = {
            # NEBULOSE
            "m42":      "Orion Nebula M42 Hubble",
            "ic434":    "Horsehead Nebula IC434 Barnard 33",
            "ngc1977":  "Running Man Nebula NGC1977",
            "m78":      "M78 reflection nebula Orion",
            "m1":       "Crab Nebula M1 supernova remnant",
            "ngc2174":  "NGC2174 Monkey Head Nebula",
            "ngc2244":  "Rosette Nebula NGC2244",
            "ngc1499":  "California Nebula NGC1499",
            "ic1805":   "Heart Nebula IC1805",
            "ic1848":   "Soul Nebula IC1848",
            "ngc2392":  "Eskimo Nebula NGC2392 Hubble",
            "ngc7000":  "North America Nebula NGC7000",
            "ic5070":   "Pelican Nebula IC5070",
            "ngc6992":  "Veil Nebula NGC6992 Eastern",
            "ngc6960":  "Western Veil Nebula NGC6960",
