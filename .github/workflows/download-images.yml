            "m16":      "Eagle Nebula M16 Pillars of Creation",
            "m17":      "Omega Nebula M17 Swan",
            "ngc7635":  "Bubble Nebula NGC7635 Hubble",
            "ngc281":   "Pacman Nebula NGC281",
            "ngc6334":  "Cat Paw Nebula NGC6334",
            "ngc6357":  "Lobster Nebula NGC6357",
            "ic1396":   "Elephant Trunk Nebula IC1396",
            "ngc7822":  "NGC7822 nebula Cepheus",
            "ngc2070":  "Tarantula Nebula 30 Doradus",
            "ic2177":   "Seagull Nebula IC2177",
            "ngc1893":  "Tadpole Nebula IC410 NGC1893",
            "sh2155":   "Cave Nebula Sh2-155",
            "ngc40":    "NGC40 bow tie nebula",
            "sh2240":   "Spaghetti Nebula Simeis 147",
            "ngc896":   "Fish Head Nebula IC1795",
            "ngc2068b": "Barnard Loop nebula Orion",
            "ngc2264":  "Cone Nebula NGC2264",
