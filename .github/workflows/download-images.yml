name: Download Astro Images

on:
  workflow_dispatch:  # esegui manualmente con un click

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all images
        run: |
          mkdir -p img
          BASE="https://upload.wikimedia.org/wikipedia/commons"
          UA="Mozilla/5.0 (AstrofotoTool/1.0)"

          download() {
            local id=$1 url=$2
            if [ ! -f "img/${id}.jpg" ]; then
              echo "Downloading ${id}..."
              curl -s -L --max-time 20 -A "$UA" -o "img/${id}.jpg" "$url" || echo "FAILED: ${id}"
              sleep 0.3
            else
              echo "Skip ${id} (exists)"
            fi
          }

          # NEBULOSE
