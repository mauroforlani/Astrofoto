            "m15":      "M15 globular cluster Hubble",
            "m2":       "M2 globular cluster Hubble",
            "m22":      "M22 globular cluster Sagittarius",
            "m10":      "M10 globular cluster Hubble",
            "m12":      "M12 globular cluster Ophiuchus",
            "m4":       "M4 globular cluster Scorpius Hubble",
            "m80":      "M80 globular cluster Hubble",
            "ngc104":   "47 Tucanae NGC104 globular Hubble",
            "ngc6397":  "NGC6397 globular cluster Hubble",
            "m56":      "M56 globular cluster Lyra",
            "m107":     "M107 globular cluster",
            "m62":      "M62 globular cluster Hubble",
            "m79":      "M79 globular cluster Hubble",
            "ngc5024":  "M53 NGC5024 globular cluster",
            "ngc6752":  "NGC6752 globular cluster",
            # AMMASSI APERTI
            "m45":      "Pleiades Seven Sisters star cluster",
            "ngc869":   "Double Cluster Perseus h chi",
            "ngc884b":  "Double Cluster NGC884 Perseus",
            "ngc7789":  "Caroline Rose Cluster NGC7789",
            "ngc457":   "Owl Cluster ET Cluster NGC457",
            "m35":      "M35 open cluster Gemini",
            "m36":      "M36 open cluster Auriga",
            "m37":      "M37 open cluster Auriga",
            "m38":      "M38 open cluster Auriga",
            "m34":      "M34 open cluster Perseus",
            "m11":      "Wild Duck Cluster M11",
            "m41":      "M41 open cluster Canis Major",
            "m50":      "M50 open cluster Monoceros",
            "m52":      "M52 open cluster Cassiopeia",
            "m67":      "M67 old open cluster Cancer",
            "m44":      "Beehive Cluster M44 Praesepe",
            "m47":      "M47 open cluster Puppis",
            "m46":      "M46 open cluster Puppis",
            "m48":      "M48 open cluster Hydra",
            "m39":      "M39 open cluster Cygnus",
            "m29":      "M29 open cluster Cygnus",
            "m26":      "M26 open cluster Scutum",
            "ngc752":   "NGC752 open cluster Andromeda",
            "ngc2362":  "NGC2362 open cluster Canis Major",
            "ngc6231":  "NGC6231 open cluster Scorpius",
            "ngc6633":  "NGC6633 open cluster Ophiuchus",
            # PIANETI
            "luna":     "Moon full surface NASA",
            "giove":    "Jupiter Great Red Spot NASA",
            "saturno":  "Saturn rings NASA Cassini",
            "marte":    "Mars planet surface NASA",
            "venere":   "Venus planet NASA",
            "urano":    "Uranus planet Voyager NASA",
            "nettuno":  "Neptune planet Voyager NASA",
            # STELLE DOPPIE
            "albireo":  "Albireo double star beta Cygni",
            "mizar":    "Mizar Alcor double star",
            "epsilonlyrae": "Epsilon Lyrae double double star",
            "etacas":   "Eta Cassiopeiae double star",
          }

          ok, fail = 0, 0
          for obj_id, query in OBJECTS.items():
              dest = f"img/{obj_id}.jpg"
              if nasa_search(query, dest):
                  ok += 1
              else:
                  fail += 1
              time.sleep(0.3)

          print(f"\n=== TOTALE: OK={ok} FAIL={fail} ===")

          def nasa_search(query, dest):
              if os.path.exists(dest) and os.path.getsize(dest) > 5000:
                  print(f"  skip {dest}")
                  return True
              try:
                  q = urllib.request.quote(query)
                  url = f"https://images-api.nasa.gov/search?q={q}&media_type=image&page_size=1"
                  req = urllib.request.Request(url, headers={"User-Agent": "AstrofotoTool/1.0"})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      data = json.loads(r.read())
                  items = data.get("collection", {}).get("items", [])
                  if not items:
                      print(f"  ✗ {dest} - no results")
                      return False
                  nasa_id = items[0]["data"][0]["nasa_id"]
                  asset_url = f"https://images-api.nasa.gov/asset/{urllib.request.quote(nasa_id)}"
                  req2 = urllib.request.Request(asset_url, headers={"User-Agent": "AstrofotoTool/1.0"})
                  with urllib.request.urlopen(req2, timeout=15) as r2:
                      assets = json.loads(r2.read())
                  hrefs = [i["href"] for i in assets.get("collection", {}).get("items", [])
                           if i["href"].lower().endswith((".jpg", ".jpeg"))]
                  if not hrefs:
                      return False
                  img_url = hrefs[0]
                  for h in hrefs:
                      if "medium" in h or "1024" in h:
                          img_url = h; break
                  req3 = urllib.request.Request(img_url, headers={"User-Agent": "AstrofotoTool/1.0"})
                  with urllib.request.urlopen(req3, timeout=20) as r3:
                      imgdata = r3.read()
                  if len(imgdata) > 5000:
                      with open(dest, "wb") as f:
                          f.write(imgdata)
                      print(f"  ✓ {dest} ({len(imgdata)//1024}KB)")
                      return True
                  return False
              except Exception as e:
                  print(f"  ✗ {dest}: {e}")
                  return False
          PYEOF

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/
          git diff --staged --quiet || git commit -m "Astro images NASA API [automated]"
          git push
