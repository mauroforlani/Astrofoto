            "m57":      "Ring Nebula M57 Lyra Hubble",
            "m27":      "Dumbbell Nebula M27",
            "ngc6543":  "Cat Eye Nebula NGC6543 Hubble",
            "ngc7293":  "Helix Nebula NGC7293",
            "ngc6302":  "Bug Nebula NGC6302 Hubble",
            "m8":       "Lagoon Nebula M8",
